sys_types.h:
  types:
    blkcnt_t: "file block count"
    blksize_t: "block size"
    clock_t: "clock ticks"
    clockid_t: "clock ID"
    dev_t: "device ID"
    gid_t: "group ID"
    id_t: "general ID (pid, uid, gid)"
    ino_t: "file serial number"
    mode_t: "file mode bits"
    nlink_t: "link count"
    off_t: "file offset"
    pid_t: "process ID"
    size_t: "unsigned size"
    ssize_t: "signed size (or -1)"
    suseconds_t: "microseconds"
    time_t: "time in seconds since epoch"
    timer_t: "timer ID"
    uid_t: "user ID"
    pthread_t: "thread ID"
    pthread_attr_t: "thread attributes"
    pthread_mutex_t: "mutex"
    pthread_mutexattr_t: "mutex attributes"
    pthread_cond_t: "condition variable"
    pthread_condattr_t: "condition attributes"
