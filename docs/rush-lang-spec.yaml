# Rush Language Spec — One-Shot LLM Reference
# Architecture: Rush code → Lexer → Parser → AST → Evaluator (native Rust)
# Shell commands run via fork/exec. Rush syntax evaluates natively.
# No $ prefix, blocks use end, interpolation is #{expr}, braces for lambdas only.

meta:
  engine: "Native Rust interpreter"
  runtime: "Rust"

# ── COMMON MISTAKES ──────────────────────────────────────────────
mistakes:
  - { wrong: '$name = "x"',       right: 'name = "x"' }
  - { wrong: 'foreach ($x in $l) { }', right: 'for x in l ... end' }
  - { wrong: 'Get-ChildItem ...',  right: 'Dir.list(".")' }
  - { wrong: '[IO.File]::ReadAllText(p)', right: 'File.read(p)' }
  - { wrong: 'puts("hello")',      right: 'puts "hello"' }
  - { wrong: 'if (x > 5) { }',    right: 'if x > 5 ... end' }
  - { wrong: '@name = value',      right: 'self.name = value' }
  - { wrong: 'Dog.new(name: "x")', right: 'Dog.new("x")', note: "positional args only at .new()" }
  - { wrong: 'static def foo()',   right: 'def self.foo()' }

# ── VARIABLES ────────────────────────────────────────────────────
variables:
  assignment: "name = expr"
  multiple: "a, b, c = 1, 2, 3"
  capture: "name = $(whoami) — capture shell command output"
  compound: ["+=", "-=", "*=", "/="]
  note: "No $ prefix, no let/var."

# ── STRINGS ──────────────────────────────────────────────────────
strings:
  double: '"hello #{expr}" — interpolation with #{}'
  single: "'literal — no interpolation'"
  heredoc: "<<END ... END"
  escapes: ['\\n newline', '\\t tab', '\\e ESC (0x1B)', '\\\\ backslash']

# ── OPERATORS ────────────────────────────────────────────────────
operators:
  comparison: ["==", "!=", ">", "<", ">=", "<="]
  logical: ["&&", "||", "!", "not"]
  regex: ["=~", "!~"]
  ternary: "condition ? then_expr : else_expr"
  safe_nav: "obj&.method — short-circuits to nil if obj is nil"

# ── CONTROL FLOW ─────────────────────────────────────────────────
control_flow:
  if: "if cond ... elsif cond ... else ... end"
  unless: "unless cond ... end  (no elsif/else)"
  inline: "puts x if verbose  |  next unless valid"
  case: "case expr; when val ... else ... end"
  match: "match expr; when val ... else ... end  (alias for case)"

# ── LOOPS ────────────────────────────────────────────────────────
loops:
  for: "for item in collection ... end"
  while: "while cond ... end"
  until: "until cond ... end"
  loop: "loop ... break if cond ... end"
  times: "5.times { |i| puts i }"
  control: { next: "continue (preferred)", break: "break" }

# ── PARALLEL & ORCHESTRATION ─────────────────────────────────────
parallel:
  basic: "parallel x in collection ... end  (concurrent iteration)"
  workers: "parallel(4) x in items ... end  (limit to 4 threads)"
  timeout: "parallel(4, 30) x in items ... end  (4 workers, 30s timeout)"
  fail_fast: "parallel! x in items ... end  (stop on first error)"
orchestrate:
  syntax: |
    orchestrate
      task "name" do ... end
      task "name", after: "dep" do ... end
      task "name", after: ["dep1", "dep2"] do ... end
    end
  behavior: "runs independent tasks concurrently, respects dependency order"
ssh:
  run: 'Ssh.run("host", "command")  → {status:, exit_code:, stdout:, stderr:, host:}'
  test: 'Ssh.test("host")  → true/false'
  hop: 'Ssh.run("bastion", "ssh target command")  — nested SSH through jump host'

# ── RANGES ───────────────────────────────────────────────────────
ranges:
  inclusive: "1..5  (yields 1,2,3,4,5)"
  exclusive: "1...5  (yields 1,2,3,4)"

# ── FUNCTIONS ────────────────────────────────────────────────────
functions:
  syntax: |
    def greet(name, greeting = "hello")
      puts "#{greeting}, #{name}!"
    end
  return: "Last expression is implicit return. Explicit return also works."
  named_args: 'greet("World", greeting: "Hi")'

# ── BLOCKS & LAMBDAS ────────────────────────────────────────────
blocks:
  syntax: "collection.method { |item| body }"
  methods:
    each: "iterate (no return value)"
    map: "transform each element → new array"
    select: "filter where block returns true"
    reject: "filter where block returns false"
    sort_by: "sort by block return value"
    any?: "true if any element matches"
    all?: "true if all elements match"
    find: "first element matching block"
  chaining: |
    ls /var/log
      .select { |f| f.name =~ /\.log$/ }
      .sort_by { |f| f.length }
      .reverse
      .first(10)
      .each { |f| puts f.name }

# ── ARRAYS ───────────────────────────────────────────────────────
arrays:
  literal: "[1, 2, 3]"
  methods: [".count", ".first", ".last", ".reverse", ".sort", ".uniq",
            ".include?(x)", ".push(x)", ".skip(n)", ".flatten", ".join(sep)"]

# ── HASHES ───────────────────────────────────────────────────────
hashes:
  literal: '{ name: "DNS", port: 53 }'
  access: 'h["key"]'
  iteration: 'h.each { |k, v| puts "#{k}=#{v}" }'

# ── STRINGS (methods) ───────────────────────────────────────────
string_methods:
  transform: [".upcase", ".downcase", ".strip", ".lstrip", ".rstrip", ".reverse"]
  query: [".length", ".empty?", ".include?(s)", ".start_with?(s)", ".end_with?(s)"]
  modify: [".replace(old, new)", ".split(sep)", ".split_whitespace", ".lines",
           ".ljust(n)", ".rjust(n)", ".trim_end(chars)", ".sub(pat, rep)", ".gsub(pat, rep)"]
  convert: [".to_i", ".to_f", ".to_s"]
  color: [".red", ".green", ".blue", ".cyan", ".yellow", ".magenta", ".white", ".gray"]
  output: [".print", ".puts"]

# ── NUMERIC METHODS ──────────────────────────────────────────────
numeric_methods: [".abs", ".round(n)", ".to_i", ".to_f", ".to_s",
                  ".to_currency", ".to_filesize", ".to_percent",
                  ".times { |i| }"]

# ── REGEX ────────────────────────────────────────────────────────
regex:
  literal: "/pattern/flags  (flags: i, m, x)"
  match: "str =~ /pat/  |  str !~ /pat/"
  methods: [".sub(pat, rep) — first match", ".gsub(pat, rep) — all matches",
            ".scan(pat) — all matches as array", ".match(pat) — match object"]

# ── CLASSES ──────────────────────────────────────────────────────
classes:
  syntax: |
    class Dog < Animal
      attr name, breed
      attr age: Int = 0

      def initialize(name, breed)
        super(name)
        self.breed = breed
      end

      def speak
        return self.name + " says Woof!"
      end

      def self.species
        return "Canis lupus"
      end
    end

    d = Dog.new("Rex", "Lab")
    puts d.speak()
    puts Dog.species()
  rules:
    - "self.prop for instance access (not bare name)"
    - ".new() for instantiation"
    - "def self.method() for static methods"
    - "attr with optional type and default: attr name: String = \"unnamed\""
    - "Inheritance uses < syntax"
    - "super(args) in constructor, super.method() in methods"

# ── ENUMS ────────────────────────────────────────────────────────
enums:
  syntax: "enum Color; red; green; blue; end"
  access: "Color.red"
  values: "enum Status; pending = 0; active = 1; end"

# ── ERROR HANDLING ───────────────────────────────────────────────
errors:
  syntax: "begin ... rescue ExType => e ... ensure ... end"
  shorthand: "try ... rescue e ... end"
  raise: "die \"message\""

# ── PLATFORM BLOCKS ──────────────────────────────────────────────
platforms:
  keywords: [macos, linux, win64, win32, isssh]
  syntax: "macos; puts \"macOS\"; end"
  properties: [".arch (x64, arm64)", ".version (OS version comparison)"]
  win32_note: "win32 body is raw shell for 32-bit compatibility"
  unc_paths: "//ssh:host/path (SSH, all platforms), //server/share (SMB, Windows)"

# ── STDLIB: File ─────────────────────────────────────────────────
file_stdlib:
  - "File.read(path) — entire file as string"
  - "File.read_lines(path) — array of lines"
  - "File.read_json(path) — parse JSON → object"
  - "File.read_csv(path) — parse CSV → array of objects"
  - "File.write(path, content) — write/overwrite"
  - "File.append(path, content) — append"
  - "File.exist?(path) — boolean"
  - "File.delete(path) — remove file"
  - "File.size(path) — bytes"

# ── STDLIB: Dir ──────────────────────────────────────────────────
dir_stdlib:
  - "Dir.list(path, type:nil, recursive:false, hidden:false) — list entries"
  - "Dir.list(path, :files) — shorthand for type:'file'"
  - "Dir.list(path, :dirs) — shorthand for type:'dir'"
  - "Dir.list(path, :recurse) — shorthand for recursive:true"
  - "Dir.list(path, :hidden) — shorthand for hidden:true"
  - "Dir.exist?(path) — boolean"
  - "Dir.mkdir(path) — create with parents"

# ── STDLIB: Time ─────────────────────────────────────────────────
time_stdlib:
  - "Time.now — current datetime"
  - "24.hours / 30.minutes / 7.days — TimeSpan durations"
  - "Time.now - 24.hours — datetime arithmetic"

# ── PIPELINE OPERATORS ───────────────────────────────────────────
pipeline_ops:
  - "| where prop op value — filter (==, !=, >, <, =~, !~)"
  - "| where /regex/ — match against full line"
  - "| where prop /regex/ — match against property"
  - "| select prop1, prop2 — pick columns"
  - "| sort — sort ascending"
  - "| sort --desc — sort descending"
  - "| first N — take first N"
  - "| last N — take last N"
  - "| skip N — skip first N"
  - "| count — count items"
  - "| distinct — unique values"
  - "| sum / avg / min / max — aggregates"
  - "| as json — format as JSON"
  - "| as csv — format as CSV"
  - "| tee file — write to file and pass through"
  - "| objectify — convert text table to objects"
  - "| columns 1,3,5 — select columns by index (1-based)"
  - "| puts / print / warn — terminal sinks (hostname | puts prints hostname)"

# ── BUILTINS IN PIPELINES ────────────────────────────────────────
# Rush-cli builtins compose with pipelines in any position:
#
#   echo hi | alias              — RHS: data-producer builtin,
#                                   stdin ignored, emits pipe-friendly
#                                   `name=value` lines
#   alias | grep ga              — LHS: builtin output captured and
#                                   fed into the native tail
#   ls | alias | head -5         — middle: captured, reinjected
#   alias | first 3              — builtin output → Rush pipe ops
#   hostname | puts              — terminal sink, prints to stdout
#
# Data-producer builtins emit plain lines (no numbering, no indicator
# marks, no shell-alias quoting) when invoked as a pipeline stage:
#
#   alias         producer: `ga=/usr/bin/git add`
#   history       producer: plain command lines (no `123  ` prefix)
#   dirs          producer: one dir per line
#   path          producer: one PATH entry per line (no ✓/✗/↑ marks)
#   pwd           producer: one line
#   which/type    producer: one line per lookup
#   jobs          producer: `[1] Running PID cmd`
#
# Non-producing builtins (cd, exit, export, …) invoked on the RHS
# emit `rush: NAME: builtin does not consume stdin` instead of
# exec-failing with 127.

# ── PREDICATE METHODS ────────────────────────────────────────────
predicates:
  - ".empty? — string/array is empty"
  - ".nil? — value is null"
  - ".include?(x) — collection contains x"
  - ".start_with?(s) / .end_with?(s)"
  - ".exist? — File/Dir existence"
  - "$?.ok? / $?.failed? / $?.code — last exit status"

# ── BUILT-IN FUNCTIONS ───────────────────────────────────────────
# Note: bare expressions (x + 1, y.sum, "hello #{name}") evaluate
# but do NOT write to stdout — Rush is a shell, not a REPL. Use
# puts/print to emit a value. This matters especially in --llm /
# --mcp modes where output is the only channel the caller sees.
builtins:
  - "puts expr — print with newline"
  - "print expr — print without newline"
  - "warn expr — print to stderr"
  - "die msg — raise fatal error"
  - "exit N — exit with code"
  - "sleep N — sleep N seconds"
  - "ask prompt — interactive input"

# ── BUILT-IN VARIABLES ──────────────────────────────────────────
builtin_vars:
  - "$? — last exit status (.ok?, .failed?, .code)"
  - "$os — operating system (macos, linux, windows)"
  - "$arch — CPU architecture (x64, arm64)"
  - "$hostname — machine hostname"
  - "$user — current username"
  - "$rush_version — Rush version string"
  - "$pid — current process ID"
  - "ARGV — script arguments array"
  - "env.NAME or env[\"NAME\"] — environment variables"
  - "env[/REGEX/] — filter env vars by pattern"
  - "__FILE__ / __DIR__ — current script path/directory"

# ── SHELL BUILTINS ───────────────────────────────────────────────
shell_builtins:
  cd: "cd [path] — change directory"
  cat: "cat [-n] file — read/concatenate files"
  export: "export FOO=bar [--save] — set env var"
  alias: "alias name=value [--save] — create command alias"
  unalias: "unalias name — remove alias"
  path: "path [add|rm|check|dedupe] — manage PATH"
  sql: "sql @conn \"query\" [--json|--csv] — database queries (SQLite/Postgres/ODBC)"
  sync: "sync — sync config across machines"
  set: "set key value — configure shell settings"
  setbg: "setbg [--selector] — set terminal background color"
  help: "help [topic] — built-in help system"
  reload: "reload — reload config and init scripts"
  history: "history — show command history"

# ── SIZE LITERALS ────────────────────────────────────────────────
sizes: "1kb (1024), 5mb, 2gb — size literals"

# ── POSIX FEATURES ───────────────────────────────────────────────
posix:
  job_control: ["cmd & — run in background", "jobs — list background jobs",
                "fg %N — bring job to foreground", "bg %N — resume job in background"]
  signals: ["trap handler SIGINT — register signal handler",
            "trap 'cleanup' EXIT — run on exit"]
  redirects: ["cmd > file", "cmd >> file", "cmd 2>&1", "cmd < file"]

# ── STDLIB: Ssh ──────────────────────────────────────────────────
ssh_stdlib:
  - 'Ssh.run("host", "command") — execute command on remote host → hash {status, exit_code, stdout, stderr, host}'
  - 'Ssh.test("host") — test connectivity → bool'

# ── HELP SYSTEM ────────────────────────────────────────────────
help:
  command: "help [topic]"
  no_args: "Lists available topics"
  topics: [file, dir, time, ssh, strings, arrays, hashes, classes, enums,
           functions, loops, parallel, orchestrate, control-flow, pipelines,
           regex, errors, platforms, sql, pipeline-ops, llm-mode, mcp,
           objectify, alias, path, export, set, cd, init,
           config, xref, known-issues]
  key_topic: "xref — bash/Unix → Rush cross-reference. Use BEFORE writing shell commands."
  note: "Use help <topic> for detailed syntax, methods, examples, and rules."

# ── EXAMPLE ──────────────────────────────────────────────────────
example: |
  #!/usr/bin/env rush
  target = ARGV[0] || die("usage: deploy.rush <env>")
  branch = $(git rev-parse --abbrev-ref HEAD).strip

  unless branch == "main" || target == "staging"
    die "can only deploy from main (on #{branch})"
  end

  puts "deploying #{branch} to #{target}..."

  # Build on all hosts in parallel (2 at a time, 5 min timeout)
  hosts = ["web1", "web2", "web3"]
  parallel(2, 300) host in hosts
    result = Ssh.run(host, "cd /app && git pull && cargo build --release")
    puts "#{host}: #{result["status"]}"
  end

  # Or use orchestrate for dependency-ordered tasks
  orchestrate
    task "build" do
      npm run build
    end
    task "test", after: "build" do
      npm test
    end
    task "deploy", after: "test" do
      rsync -avz --delete dist/ prod.example.com:/var/www/
    end
  end

  puts "done.".green
