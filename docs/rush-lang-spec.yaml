# Rush Language Spec — One-Shot LLM Reference
# Architecture: Rush code → Lexer → Parser → AST → Transpiler → PowerShell 7
# Shell commands pass through verbatim. Rush syntax transpiles to PS.
# No $ prefix, blocks use end, interpolation is #{expr}, braces for lambdas only.

meta:
  engine: "PowerShell 7 via Microsoft.PowerShell.SDK"
  runtime: ".NET 8"

# ── COMMON MISTAKES ──────────────────────────────────────────────
mistakes:
  - { wrong: '$name = "x"',       right: 'name = "x"' }
  - { wrong: 'foreach ($x in $l) { }', right: 'for x in l ... end' }
  - { wrong: 'Get-ChildItem ...',  right: 'Dir.list(".")' }
  - { wrong: '[IO.File]::ReadAllText(p)', right: 'File.read(p)' }
  - { wrong: 'puts("hello")',      right: 'puts "hello"' }
  - { wrong: 'if (x > 5) { }',    right: 'if x > 5 ... end' }
  - { wrong: '@name = value',      right: 'self.name = value' }
  - { wrong: 'Dog.new(name: "x")', right: 'Dog.new("x")', note: "positional args only at .new()" }
  - { wrong: 'static def foo()',   right: 'def self.foo()' }

# ── VARIABLES ────────────────────────────────────────────────────
variables:
  assignment: "name = expr  →  $name = expr"
  multiple: "a, b, c = 1, 2, 3  →  $a = 1; $b = 2; $c = 3"
  capture: "name = $(whoami)  →  $name = (whoami)"
  compound: ["+=", "-=", "*=", "/="]
  note: "No $ prefix, no let/var. First token + = → assignment."

# ── STRINGS ──────────────────────────────────────────────────────
strings:
  double: '"hello #{expr}"  →  "hello $($expr)"'
  single: "'literal — no interpolation'"
  heredoc: "<<END ... END  →  @\" ... \"@"
  escapes: ['\\n newline', '\\t tab', '\\e ESC (0x1B)', '\\\\ backslash']

# ── OPERATORS ────────────────────────────────────────────────────
operators:
  comparison: { "==": "-eq", "!=": "-ne", ">": "-gt", "<": "-lt", ">=": "-ge", "<=": "-le" }
  logical: { "&&": "-and", "||": "-or", "!": "-not", "not": "-not" }
  regex: { "=~": "-match", "!~": "-notmatch" }
  ternary: "condition ? then_expr : else_expr  →  $(if (cond) { then } else { else })"
  safe_nav: "obj&.method  →  if ($null -ne $obj) { $obj.Method }"

# ── CONTROL FLOW ─────────────────────────────────────────────────
control_flow:
  if: "if cond ... elsif cond ... else ... end"
  unless: "unless cond ... end  (no elsif/else)"
  inline: "puts x if verbose  |  next unless valid"
  case: "case expr; when val ... else ... end"
  match: "match expr; when val ... else ... end  (alias for case)"

# ── LOOPS ────────────────────────────────────────────────────────
loops:
  for: "for item in collection ... end  →  foreach ($item in $collection) { }"
  while: "while cond ... end"
  until: "until cond ... end  →  while (-not cond) { }"
  loop: "loop ... break if cond ... end  →  while ($true) { }"
  times: "5.times { |i| puts i }  →  0..4 | ForEach-Object { }"
  control: { next: "continue (preferred)", break: "break" }

# ── RANGES ───────────────────────────────────────────────────────
ranges:
  inclusive: "1..5  →  1..5  (yields 1,2,3,4,5)"
  exclusive: "1...5  →  1..4  (yields 1,2,3,4)"

# ── FUNCTIONS ────────────────────────────────────────────────────
functions:
  syntax: |
    def greet(name, greeting = "hello")
      puts "#{greeting}, #{name}!"
    end
  return: "Last expression is implicit return. Explicit return also works."
  named_args: 'greet("World", greeting: "Hi")'

# ── BLOCKS & LAMBDAS ────────────────────────────────────────────
blocks:
  syntax: "collection.method { |item| body }"
  methods:
    each: "iterate (no return value)"
    map: "transform each element → new array"
    select: "filter where block returns true"
    reject: "filter where block returns false"
    sort_by: "sort by block return value"
    any?: "true if any element matches"
    all?: "true if all elements match"
    find: "first element matching block"
  chaining: |
    ls /var/log
      .select { |f| f.name =~ /\.log$/ }
      .sort_by { |f| f.length }
      .reverse
      .first(10)
      .each { |f| puts f.name }

# ── ARRAYS ───────────────────────────────────────────────────────
arrays:
  literal: "[1, 2, 3]"
  methods: [".count", ".first", ".last", ".reverse", ".sort", ".uniq",
            ".include?(x)", ".push(x)", ".skip(n)", ".flatten", ".join(sep)"]

# ── HASHES ───────────────────────────────────────────────────────
hashes:
  literal: '{ name: "DNS", port: 53 }  →  @{ name = "DNS"; port = 53 }'
  access: 'h["key"]'
  iteration: 'h.each { |k, v| puts "#{k}=#{v}" }'

# ── STRINGS (methods) ───────────────────────────────────────────
string_methods:
  transform: [".upcase", ".downcase", ".strip", ".lstrip", ".rstrip", ".reverse"]
  query: [".length", ".empty?", ".include?(s)", ".start_with?(s)", ".end_with?(s)"]
  modify: [".replace(old, new)", ".split(sep)", ".split_whitespace", ".lines",
           ".ljust(n)", ".rjust(n)", ".trim_end(chars)", ".sub(pat, rep)", ".gsub(pat, rep)"]
  convert: [".to_i", ".to_f", ".to_s"]
  color: [".red", ".green", ".blue", ".cyan", ".yellow", ".magenta", ".white", ".gray"]
  output: [".print", ".puts"]

# ── NUMERIC METHODS ──────────────────────────────────────────────
numeric_methods: [".abs", ".round(n)", ".to_i", ".to_f", ".to_s",
                  ".to_currency", ".to_filesize", ".to_percent",
                  ".times { |i| }"]

# ── REGEX ────────────────────────────────────────────────────────
regex:
  literal: "/pattern/flags  (flags: i, m, x)"
  match: "str =~ /pat/  |  str !~ /pat/"
  methods: [".sub(pat, rep) — first match", ".gsub(pat, rep) — all matches",
            ".scan(pat) — all matches as array", ".match(pat) — match object"]

# ── CLASSES ──────────────────────────────────────────────────────
classes:
  syntax: |
    class Dog < Animal
      attr name, breed
      attr age: Int = 0

      def initialize(name, breed)
        super(name)
        self.breed = breed
      end

      def speak
        return self.name + " says Woof!"
      end

      def self.species
        return "Canis lupus"
      end
    end

    d = Dog.new("Rex", "Lab")
    puts d.speak()
    puts Dog.species()
  rules:
    - "self.prop for instance access (not bare name)"
    - ".new() for instantiation"
    - "def self.method() for static methods"
    - "attr with optional type and default: attr name: String = \"unnamed\""
    - "Inheritance uses < syntax"
    - "super(args) in constructor, super.method() in methods"

# ── ENUMS ────────────────────────────────────────────────────────
enums:
  syntax: "enum Color; red; green; blue; end"
  access: "Color.red  →  [Color]::Red"
  values: "enum Status; pending = 0; active = 1; end"

# ── ERROR HANDLING ───────────────────────────────────────────────
errors:
  syntax: "begin ... rescue ExType => e ... ensure ... end  →  try/catch/finally"
  shorthand: "try ... rescue e ... end"
  raise: "die \"message\"  →  throw"

# ── PLATFORM BLOCKS ──────────────────────────────────────────────
platforms:
  keywords: [macos, linux, win64, win32, isssh, ps, ps5]
  syntax: "macos; puts \"macOS\"; end  →  if ($os -eq 'macos') { }"
  properties: [".arch (x64, arm64)", ".version (OS or PS version comparison)"]
  win32_note: "win32 body is raw PowerShell 5.1 (for 32-bit OLEDB/ODBC)"
  ps_note: "ps...end = raw PowerShell 7, NO Rush expansion. $_ and script blocks survive. Cross-platform."
  ps5_note: "ps5...end = raw PowerShell 5.1 on Windows (legacy modules like ActiveDirectory)"
  ps_collision: "bare 'ps' = block keyword. 'ps -ef' / 'ps aux' = Unix ps command (not a block)"

# ── STDLIB: File ─────────────────────────────────────────────────
file_stdlib:
  - "File.read(path) — entire file as string"
  - "File.read_lines(path) — array of lines"
  - "File.read_json(path) — parse JSON → object"
  - "File.read_csv(path) — parse CSV → array of objects"
  - "File.write(path, content) — write/overwrite"
  - "File.append(path, content) — append"
  - "File.exist?(path) — boolean"
  - "File.delete(path) — remove file"
  - "File.size(path) — bytes"

# ── STDLIB: Dir ──────────────────────────────────────────────────
dir_stdlib:
  - "Dir.list(path, type:nil, recursive:false, hidden:false) — list entries"
  - "Dir.list(path, :files) — shorthand for type:'file'"
  - "Dir.list(path, :dirs) — shorthand for type:'dir'"
  - "Dir.list(path, :recurse) — shorthand for recursive:true"
  - "Dir.list(path, :hidden) — shorthand for hidden:true"
  - "Dir.exist?(path) — boolean"
  - "Dir.mkdir(path) — create with parents"

# ── STDLIB: Time ─────────────────────────────────────────────────
time_stdlib:
  - "Time.now — current datetime"
  - "24.hours / 30.minutes / 7.days — TimeSpan durations"
  - "Time.now - 24.hours — datetime arithmetic"

# ── PIPELINE OPERATORS ───────────────────────────────────────────
pipeline_ops:
  - "| where prop op value — filter (==, !=, >, <, =~, !~)"
  - "| where /regex/ — match against full line"
  - "| where prop /regex/ — match against property"
  - "| select prop1, prop2 — pick columns"
  - "| sort — sort ascending"
  - "| sort --desc — sort descending"
  - "| first N — take first N"
  - "| last N — take last N"
  - "| skip N — skip first N"
  - "| count — count items"
  - "| distinct — unique values"
  - "| sum / avg / min / max — aggregates"
  - "| as json — format as JSON"
  - "| as csv — format as CSV"
  - "| tee file — write to file and pass through"
  - "| objectify — convert text table to objects"
  - "| columns 1,3,5 — select columns by index (1-based)"

# ── STATIC MEMBER ACCESS ────────────────────────────────────────
static_access:
  syntax: "[Type]::Member or [Type]::Method(args)"
  examples:
    - "[Math]::PI  →  3.14159..."
    - "[Math]::Abs(-42)  →  42"
    - "[IO.Path]::GetExtension(f)"

# ── PREDICATE METHODS ────────────────────────────────────────────
predicates:
  - ".empty? — string/array is empty"
  - ".nil? — value is null"
  - ".include?(x) — collection contains x"
  - ".start_with?(s) / .end_with?(s)"
  - ".exist? — File/Dir existence"
  - "$?.ok? / $?.failed? / $?.code — last exit status"

# ── BUILT-IN FUNCTIONS ───────────────────────────────────────────
builtins:
  - "puts expr — print with newline (Write-Output)"
  - "print expr — print without newline (Write-Host -NoNewline)"
  - "warn expr — print to stderr (Write-Warning)"
  - "die msg — raise fatal error (throw)"
  - "exit N — exit with code"
  - "sleep N — sleep N seconds"
  - "ask prompt — interactive input (Read-Host)"

# ── BUILT-IN VARIABLES ──────────────────────────────────────────
builtin_vars:
  - "$? — last exit status (.ok?, .failed?, .code)"
  - "ARGV — script arguments array"
  - "env.NAME or env[\"NAME\"] — environment variables"
  - "env[/REGEX/] — filter env vars by pattern"
  - "__FILE__ / __DIR__ — current script path/directory"

# ── SHELL BUILTINS ───────────────────────────────────────────────
shell_builtins:
  cat: "cat [-n] file — read/concatenate files"
  export: "export FOO=bar [--save] — set env var"
  path: "path [add|rm|check|dedupe] — manage PATH"
  sql: "sql @conn \"query\" [--json|--csv] — database queries (SQLite/Postgres/ODBC)"

# ── SIZE LITERALS ────────────────────────────────────────────────
sizes: "1kb (1024), 5mb, 2gb — PowerShell native"

# ── HELP SYSTEM ────────────────────────────────────────────────
help:
  command: "help [topic]"
  no_args: "Lists available topics"
  topics: [file, dir, time, strings, arrays, hashes, classes, enums,
           functions, loops, control-flow, pipelines, regex, errors,
           platforms, sql, pipeline-ops, llm-mode, mcp, objectify,
           config, xref, known-issues]
  key_topic: "xref — bash/Unix → Rush cross-reference. Use BEFORE writing shell commands."
  note: "Use help <topic> for detailed syntax, methods, examples, and rules."

# ── EXAMPLE ──────────────────────────────────────────────────────
example: |
  #!/usr/bin/env rush
  target = ARGV[0] || die("usage: deploy.rush <env>")
  branch = $(git rev-parse --abbrev-ref HEAD).strip

  unless branch == "main" || target == "staging"
    die "can only deploy from main (on #{branch})"
  end

  puts "deploying #{branch} to #{target}..."
  git pull origin main
  npm run build

  if target == "production"
    rsync -avz --delete dist/ prod.example.com:/var/www/
  else
    rsync -avz --delete dist/ staging.example.com:/var/www/
  end

  puts "done.".green
