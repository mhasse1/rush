name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: rush
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: rush
          - os: macos-latest
            rid: osx-arm64
            artifact: rush
          - os: windows-latest
            rid: win-x64
            artifact: rush.exe
          - os: windows-latest
            rid: win-arm64
            artifact: rush.exe

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.0.1xx'

      - name: Build
        run: dotnet build
        working-directory: dotnet

      - name: Test
        run: dotnet test Rush.Tests --logger "trx;LogFileName=results.trx"
        working-directory: dotnet

      - name: Publish single-file binary
        if: success()
        run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true -p:SkipCleanCheck=true
        working-directory: dotnet

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: rush-${{ matrix.rid }}
          path: dotnet/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.artifact }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: test-results-${{ matrix.os }}
          path: dotnet/Rush.Tests/TestResults/*.trx

  # Rust build and test
  rust-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Unit Tests
        run: cargo test

      - name: LLM Mode Tests
        run: |
          # Test LLM context output
          echo 'echo hello' | target/release/rush-cli --llm 2>/dev/null | head -1 | python3 -c "
          import sys, json
          ctx = json.loads(sys.stdin.readline())
          assert ctx['ready'] == True, 'context not ready'
          assert ctx['shell'] == 'rush', f'wrong shell: {ctx[\"shell\"]}'
          print('✓ LLM context OK')
          "

          # Test LLM command execution
          echo 'echo hello' | target/release/rush-cli --llm 2>/dev/null | sed -n '2p' | python3 -c "
          import sys, json
          result = json.loads(sys.stdin.readline())
          assert result['status'] == 'success', f'status: {result[\"status\"]}'
          assert result['stdout'] == 'hello', f'stdout: {result.get(\"stdout\")}'
          print('✓ LLM execute OK')
          "

          # Test LLM Rush syntax
          echo 'puts 1 + 2' | target/release/rush-cli --llm 2>/dev/null | sed -n '2p' | python3 -c "
          import sys, json
          result = json.loads(sys.stdin.readline())
          assert result['status'] == 'success', f'status: {result[\"status\"]}'
          assert result['stdout'] == '3', f'stdout: {result.get(\"stdout\")}'
          print('✓ LLM Rush eval OK')
          "

          # Test LLM TTY blocklist
          echo 'vim test.txt' | target/release/rush-cli --llm 2>/dev/null | sed -n '2p' | python3 -c "
          import sys, json
          result = json.loads(sys.stdin.readline())
          assert result.get('error_type') == 'tty_required', f'expected tty_required, got: {result}'
          print('✓ LLM TTY blocklist OK')
          "

      - name: MCP Mode Tests
        run: |
          # Test MCP initialize
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize"}' | target/release/rush-cli --mcp 2>/dev/null | python3 -c "
          import sys, json
          resp = json.loads(sys.stdin.readline())
          assert resp['result']['serverInfo']['name'] == 'rush-local', 'wrong server name'
          assert resp['result']['protocolVersion'] == '2024-11-05', 'wrong protocol version'
          print('✓ MCP initialize OK')
          "

          # Test MCP tools/list
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' | target/release/rush-cli --mcp 2>/dev/null | python3 -c "
          import sys, json
          resp = json.loads(sys.stdin.readline())
          tools = resp['result']['tools']
          names = [t['name'] for t in tools]
          assert 'rush_execute' in names, f'missing rush_execute: {names}'
          assert 'rush_read_file' in names, f'missing rush_read_file: {names}'
          assert 'rush_context' in names, f'missing rush_context: {names}'
          assert len(tools) == 3, f'expected 3 tools, got {len(tools)}'
          print('✓ MCP tools/list OK (3 tools)')
          "

          # Test MCP rush_execute
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize"}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"rush_execute","arguments":{"command":"echo mcp_ci_test"}}}\n' | target/release/rush-cli --mcp 2>/dev/null | sed -n '2p' | python3 -c "
          import sys, json
          resp = json.loads(sys.stdin.readline())
          content = json.loads(resp['result']['content'][0]['text'])
          assert content['status'] == 'success', f'status: {content[\"status\"]}'
          assert content['stdout'] == 'mcp_ci_test', f'stdout: {content.get(\"stdout\")}'
          print('✓ MCP rush_execute OK')
          "

          # Test MCP resources/list
          echo '{"jsonrpc":"2.0","id":1,"method":"resources/list"}' | target/release/rush-cli --mcp 2>/dev/null | python3 -c "
          import sys, json
          resp = json.loads(sys.stdin.readline())
          resources = resp['result']['resources']
          assert len(resources) == 1, f'expected 1 resource, got {len(resources)}'
          assert resources[0]['uri'] == 'rush://lang-spec', f'wrong uri: {resources[0][\"uri\"]}'
          print('✓ MCP resources/list OK')
          "

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: rush-rust-${{ matrix.target }}
          path: target/release/rush-cli

  # Create a GitHub issue when CI fails on main
  create-issue-on-failure:
    needs: [build-and-test, rust-build]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue for CI failure
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const title = `CI failure on main (${context.sha.substring(0, 7)})`;

            // Don't create duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,ci-failure',
              per_page: 10
            });

            const duplicate = existing.data.find(i => i.title.startsWith('CI failure on main'));
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still failing at ${context.sha.substring(0, 7)}: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['bug', 'ci-failure'],
              body: [
                `## CI Failed on main`,
                ``,
                `**Commit:** [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
                `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Triggered by:** ${context.actor}`,
                ``,
                `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details and test result artifacts.`,
              ].join('\n')
            });
