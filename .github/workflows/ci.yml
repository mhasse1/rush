name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: rush
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: rush
          - os: macos-latest
            rid: osx-arm64
            artifact: rush
          - os: windows-latest
            rid: win-x64
            artifact: rush.exe
          - os: windows-latest
            rid: win-arm64
            artifact: rush.exe

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.0.1xx'

      - name: Build
        run: dotnet build

      - name: Test
        run: dotnet test Rush.Tests --logger "trx;LogFileName=results.trx"

      - name: Publish single-file binary
        if: success()
        run: dotnet publish -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true -p:SkipCleanCheck=true

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: rush-${{ matrix.rid }}
          path: bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.artifact }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: test-results-${{ matrix.os }}
          path: Rush.Tests/TestResults/*.trx

  # Create a GitHub issue when CI fails on main
  create-issue-on-failure:
    needs: build-and-test
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue for CI failure
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const title = `CI failure on main (${context.sha.substring(0, 7)})`;

            // Don't create duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug,ci-failure',
              per_page: 10
            });

            const duplicate = existing.data.find(i => i.title.startsWith('CI failure on main'));
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Still failing at ${context.sha.substring(0, 7)}: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['bug', 'ci-failure'],
              body: [
                `## CI Failed on main`,
                ``,
                `**Commit:** [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
                `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Triggered by:** ${context.actor}`,
                ``,
                `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details and test result artifacts.`,
              ].join('\n')
            });
